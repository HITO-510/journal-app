<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#1a2332"/>
  <!-- Book spine -->
  <rect x="36" y="32" width="16" height="128" rx="4" fill="#e8833a"/>
  <!-- Book body -->
  <rect x="52" y="32" width="104" height="128" rx="8" fill="#243347"/>
  <!-- Book pages edge -->
  <rect x="52" y="36" width="4" height="120" fill="#2d4059"/>
  <!-- Lines on page -->
  <line x1="72" y1="60" x2="136" y2="60" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="78" x2="130" y2="78" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="96" x2="124" y2="96" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="114" x2="118" y2="114" stroke="#556677" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pen -->
  <g transform="translate(128, 148) rotate(-45)">
    <rect x="-4" y="-48" width="8" height="40" rx="2" fill="#e8833a"/>
    <polygon points="-4,-8 4,-8 0,2" fill="#f09a5a"/>
    <rect x="-4.5" y="-48" width="9" height="6" rx="1.5" fill="#d97030"/>
  </g>
</svg>
